name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build release binary
        run: cargo build --release --target aarch64-apple-darwin

      - name: Verify binary architecture
        run: file target/aarch64-apple-darwin/release/agentbox

      - name: Package binary
        run: |
          cd target/aarch64-apple-darwin/release
          tar czf ../../../agentbox-darwin-arm64.tar.gz agentbox
          cd ../../..

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: agentbox-darwin-arm64.tar.gz
          generate_release_notes: true

  bump-homebrew:
    needs: build
    runs-on: ubuntu-latest
    if: ${{ !contains(github.ref_name, '-') }}
    steps:
      - name: Bump Homebrew formula
        uses: mislav/bump-homebrew-formula-action@v3
        with:
          formula-name: agentbox
          formula-path: Formula/agentbox.rb
          homebrew-tap: Rag0n/homebrew-tap
          download-url: https://github.com/Rag0n/agentbox/releases/download/${{ github.ref_name }}/agentbox-darwin-arm64.tar.gz
          commit-message: |
            agentbox ${{ github.ref_name }}
        env:
          COMMITTER_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
